<div class="transfer-container">
  <div class="transfer-header">
    <h1>Transfer Money</h1>
    <p>Send money between your accounts</p>
  </div>

  <div class="transfer-card">
    <form (ngSubmit)="transferMoney()" class="transfer-form">
      <!-- From Account -->
      <div class="form-group">
        <label for="fromAccount">From Account</label>
        <select
          id="fromAccount"
          [(ngModel)]="transferData.fromAccountId"
          name="fromAccountId"
          required
          class="select-input"
        >
          <option value="" disabled selected>Select source account</option>
          <option *ngFor="let acc of accounts" [value]="acc.id">
            {{ acc.accountName }} - ₹{{ acc.balance }}
          </option>
        </select>
      </div>

      <!-- Transfer Arrow -->
      <div class="transfer-arrow">⬇️</div>

      <!-- To Account -->
      <div class="form-group">
        <label for="toAccount">To Account</label>
        <select
          id="toAccount"
          [(ngModel)]="transferData.toAccountId"
          name="toAccountId"
          required
          class="select-input"
        >
          <option value="" disabled selected>Select destination account</option>
          <option *ngFor="let acc of accounts" [value]="acc.id">
            {{ acc.accountName }} - ₹{{ acc.balance }}
          </option>
        </select>
      </div>

      <!-- Amount -->
      <div class="form-group">
        <label for="amount">Amount (₹)</label>
        <input
          id="amount"
          type="number"
          [(ngModel)]="transferData.amount"
          name="amount"
          placeholder="0.00"
          step="0.01"
          min="0"
          required
          class="text-input"
        />
      </div>

      <button type="submit" class="btn-transfer">💸 Transfer Money</button>
    </form>

    <!-- Info Box -->
    <div class="info-box">
      <h3>Transfer Tips</h3>
      <ul>
        <li>Ensure you have sufficient balance in the source account</li>
        <li>Select different accounts for source and destination</li>
        <li>Transfers are processed instantly</li>
        <li>You can reverify your transaction in Dashboard</li>
      </ul>
    </div>
  </div>
</div>
