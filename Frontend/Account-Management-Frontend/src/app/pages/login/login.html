<h2>Login</h2>

<form (ngSubmit)="onLogin()">
  <input type="email" [(ngModel)]="loginData.email" name="email" placeholder="Email" required />
  <br /><br />
  <input
    type="password"
    [(ngModel)]="loginData.password"
    name="password"
    placeholder="Password"
    required
  />
  <br /><br />
  <button type="submit">Login</button>
</form>
